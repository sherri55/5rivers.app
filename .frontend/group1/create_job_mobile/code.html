<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Create Job | 5Rivers Trucking</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container-high": "#e6e8ea",

              "surface-container": "#eceef0",
              "on-error-container": "#93000a",

              "inverse-surface": "#2d3133",

              "surface": "#f7f9fb",

              "on-tertiary-fixed-variant": "#7d2d00",
              "secondary": "#495c95",
              "on-primary-fixed": "#00174b",
              "primary": "#004ac6",
              "outline-variant": "#c3c6d7",
              "inverse-primary": "#b4c5ff",
              "surface-container-low": "#f2f4f6",
              "outline": "#737686",
              "surface-tint": "#0053db",
              "secondary-fixed-dim": "#b4c5ff",
              "on-primary-fixed-variant": "#003ea8",
              "surface-dim": "#d8dadc",
              "on-surface": "#191c1e",
              "primary-fixed-dim": "#b4c5ff",
              "on-tertiary": "#ffffff",
              "surface-container-lowest": "#ffffff",
              "surface-bright": "#f7f9fb",
              "on-background": "#191c1e",
              "secondary-fixed": "#dbe1ff",
              "primary-fixed": "#dbe1ff",
              "tertiary-container": "#bc4800",
              "secondary-container": "#acbfff",
              "on-tertiary-fixed": "#360f00",
              "on-secondary-fixed-variant": "#31447b",
              "on-secondary-container": "#394c84",
              "on-primary": "#ffffff",
              "tertiary": "#943700",
              "on-surface-variant": "#434655",
              "on-secondary-fixed": "#00174b",
              "background": "#f7f9fb",
              "surface-variant": "#e0e3e5",

              "on-secondary": "#ffffff",

            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        input:focus, select:focus {
            outline: none;
            box-shadow: none;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #e0e3e5;
            border-radius: 10px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface antialiased min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="sticky top-0 w-full z-50 bg-white/80 dark:bg-slate-950/80 backdrop-blur-md shadow-sm dark:shadow-none">
<div class="flex items-center justify-between px-4 py-3 w-full">
<div class="flex items-center gap-3">
<button class="text-blue-700 dark:text-blue-500 active:opacity-70 transition-opacity">
<span class="material-symbols-outlined">close</span>
</button>
<h1 class="font-['Inter'] font-semibold text-lg tracking-tight text-on-surface">Create New Job</h1>
</div>
<div class="flex items-center">
<div class="w-8 h-8 rounded-full bg-surface-container-highest flex items-center justify-center overflow-hidden border border-outline-variant/20">
<img class="w-full h-full object-cover" data-alt="User profile avatar photo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBSU03aEjz5VyotrIl8ME5WoMaMYegLPjkZOi_qDbAaXc2CNf-PqWkLku_Jni2vlcmoozwcN8W4m-qTRTvHkeXbx4-na0VIGHbTGVBby-ZxyyQIhqBeBYa3g7uU4GZvtkSn9XCYZRSqGwruE1aB8AxniE6am2VP7qXMoQPqJ2fc3QcH22qDP7nalfCv6OZQhtdOfQfkIiMBMiFl2bexTYi1tXmgubkErZoILGTMZLD6YmFR3JSoXy1CJnT6Ytn93ZrsyMb4a7whx9s"/>
</div>
</div>
</div>
<div class="bg-slate-100 dark:bg-slate-900 h-[1px] w-full"></div>
</header>
<main class="flex-grow px-4 py-6 max-w-lg mx-auto w-full">
<!-- Source Toggle -->
<div class="mb-8">
<label class="block font-['Inter'] text-[11px] font-medium uppercase tracking-wider text-on-surface-variant mb-3">Job Source Type</label>
<div class="grid grid-cols-2 gap-1 p-1 bg-surface-container-low rounded-xl">
<button class="flex items-center justify-center gap-2 py-3 px-4 rounded-xl text-blue-700 dark:text-blue-400 font-bold bg-blue-50/50 dark:bg-blue-900/20 active:scale-95 transition-all">
<span class="material-symbols-outlined text-[20px]">send_time_extension</span>
<span class="text-sm">Dispatched</span>
</button>
<button class="flex items-center justify-center gap-2 py-3 px-4 rounded-xl text-slate-400 dark:text-slate-500 font-medium hover:bg-slate-50 active:scale-95 transition-all">
<span class="material-symbols-outlined text-[20px]">route</span>
<span class="text-sm">Direct</span>
</button>
</div>
</div>
<form class="space-y-6">
<!-- Basic Information Section -->
<div class="space-y-4">
<div class="grid grid-cols-1 gap-4">
<!-- Date Input -->
<div class="group">
<label class="block font-['Inter'] text-[11px] font-medium uppercase tracking-wider text-on-surface-variant mb-1.5 ml-1" for="job-date">Scheduled Date</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline">calendar_today</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-highest border-none rounded-xl text-on-surface font-medium focus:bg-surface-container-lowest focus:ring-1 focus:ring-primary transition-all appearance-none" id="job-date" type="date" value="2023-10-27"/>
</div>
</div>
<!-- Company Input -->
<div class="group">
<label class="block font-['Inter'] text-[11px] font-medium uppercase tracking-wider text-on-surface-variant mb-1.5 ml-1" for="company">Company / Customer</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline">business</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-highest border-none rounded-xl text-on-surface font-medium focus:bg-surface-container-lowest focus:ring-1 focus:ring-primary transition-all" id="company" placeholder="Select or enter company" type="text"/>
</div>
</div>
</div>
<!-- Job Type -->
<div class="group">
<label class="block font-['Inter'] text-[11px] font-medium uppercase tracking-wider text-on-surface-variant mb-1.5 ml-1" for="job-type">Job Type</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline">category</span>
<select class="w-full pl-12 pr-10 py-4 bg-surface-container-highest border-none rounded-xl text-on-surface font-medium focus:bg-surface-container-lowest focus:ring-1 focus:ring-primary transition-all appearance-none" id="job-type">
<option>Full Truckload (FTL)</option>
<option>Less Than Truckload (LTL)</option>
<option>Intermodal</option>
<option>Specialized</option>
</select>
<span class="absolute right-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline pointer-events-none">expand_more</span>
</div>
</div>
<!-- Driver & Unit Group -->
<div class="grid grid-cols-1 gap-4">
<div class="group">
<label class="block font-['Inter'] text-[11px] font-medium uppercase tracking-wider text-on-surface-variant mb-1.5 ml-1" for="driver">Assigned Driver</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline">person</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-highest border-none rounded-xl text-on-surface font-medium focus:bg-surface-container-lowest focus:ring-1 focus:ring-primary transition-all" id="driver" placeholder="Search drivers..." type="text"/>
</div>
</div>
<div class="group">
<label class="block font-['Inter'] text-[11px] font-medium uppercase tracking-wider text-on-surface-variant mb-1.5 ml-1" for="unit">Unit / Truck ID</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline">local_shipping</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-highest border-none rounded-xl text-on-surface font-medium focus:bg-surface-container-lowest focus:ring-1 focus:ring-primary transition-all" id="unit" placeholder="Enter unit number" type="text"/>
</div>
</div>
</div>
</div>
<!-- Conditional Section: Dispatched Info (Always Architected for Precision) -->
<div class="pt-4 border-t border-outline-variant/10">
<div class="bg-blue-50/30 dark:bg-blue-900/10 p-5 rounded-2xl border border-blue-100/50 dark:border-blue-900/30">
<h3 class="font-['Inter'] text-[11px] font-bold uppercase tracking-widest text-blue-700 dark:text-blue-400 mb-4 flex items-center gap-2">
<span class="material-symbols-outlined text-sm">info</span>
                        Dispatch Details
                    </h3>
<div class="space-y-4">
<div class="group">
<label class="block font-['Inter'] text-[11px] font-medium uppercase tracking-wider text-on-surface-variant mb-1.5 ml-1" for="dispatcher">Primary Dispatcher</label>
<input class="w-full px-4 py-4 bg-surface-container-lowest border border-outline-variant/30 rounded-xl text-on-surface font-medium focus:ring-1 focus:ring-primary transition-all" id="dispatcher" placeholder="Assigned dispatcher name" type="text"/>
</div>
<div class="group">
<label class="block font-['Inter'] text-[11px] font-medium uppercase tracking-wider text-on-surface-variant mb-1.5 ml-1" for="carrier-amt">Carrier Amount ($)</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 font-semibold text-primary">$</span>
<input class="w-full pl-8 pr-4 py-4 bg-surface-container-lowest border border-outline-variant/30 rounded-xl text-on-surface font-medium focus:ring-1 focus:ring-primary transition-all" id="carrier-amt" placeholder="0.00" type="number"/>
</div>
</div>
</div>
</div>
</div>
<!-- Spacer for floating actions if needed -->
<div class="h-20"></div>
</form>
</main>
<!-- Fixed Action Bar -->
<footer class="fixed bottom-0 w-full z-50 bg-white dark:bg-slate-950 border-t border-slate-100 dark:border-slate-800 shadow-[0_-4px_12px_rgba(0,0,0,0.02)]">
<div class="flex items-center gap-3 px-4 py-4 pb-safe">
<button class="flex-1 py-4 px-6 rounded-xl text-slate-600 dark:text-slate-400 font-semibold bg-surface-container active:scale-95 transition-all">
                Cancel
            </button>
<button class="flex-[2] py-4 px-6 rounded-xl text-white font-bold bg-gradient-to-b from-primary-container to-primary shadow-lg shadow-blue-500/20 active:scale-[0.98] transition-all">
                Create Job
            </button>
</div>
</footer>
<!-- BottomNavBar (Hidden on this transactional focused screen as per guidelines) -->
<!-- The Navigation is suppressed to prioritize the focused Create Job task -->
</body></html>
